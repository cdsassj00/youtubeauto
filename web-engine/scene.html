<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; height: 100%; background: #070912; overflow: hidden; }
      #c { display: block; position: absolute; inset: 0; }
      .overlay { position: absolute; inset: 0; pointer-events: none; font-family: 'Pretendard', 'Malgun Gothic', system-ui, Arial, sans-serif; color: #fff; }
      .title { position: absolute; left: 70px; top: 64px; opacity: 0; }
      .kicker { font-size: 24px; color: #4dabf7; letter-spacing: 3px; font-weight: 700; }
      .h1 { font-size: 60px; font-weight: 800; margin-top: 6px; line-height: 1.1; max-width: 60%; text-shadow: 0 4px 24px #000a; }
      .caption { position: absolute; left: 70px; right: 70px; bottom: 60px; font-size: 30px; font-weight: 600;
        opacity: 0; text-align: center; }
      .caption span { background: #000000bb; padding: 12px 26px; border-radius: 14px; }
      /* 3D 노드에 붙는 라벨(HTML을 3D 좌표에 투영) */
      .nodelabel { position: absolute; transform: translate(-50%, -50%); font-size: 26px; font-weight: 800;
        padding: 6px 16px; border-radius: 12px; background: #0b0f1acc; border: 2px solid #ffffff22;
        white-space: nowrap; opacity: 0; text-shadow: 0 2px 8px #000; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div class="overlay">
      <div class="title" id="title"><div class="kicker" id="kicker"></div><div class="h1" id="h1"></div></div>
      <div class="caption" id="cap"><span id="capspan"></span></div>
      <div id="labels"></div>
    </div>

    <script src="./three.min.js"></script>
    <script>
      // ── 씬 데이터 (파이프라인이 __DATA 로 주입; 없으면 데모 기본값) ──
      const DATA = window.__DATA || {
        kicker: 'AI CONCEPT',
        title: 'RAG 파이프라인',
        caption: '입력 → 검색 → 생성 → 답변',
        accent: '#e8590c',
        nodes: [
          { label: '질문', color: '#4dabf7' },
          { label: '검색', color: '#2f9e44' },
          { label: '생성', color: '#9c36b5' },
          { label: '답변', color: '#e64980' },
        ],
      };
      const DURATION = Number(window.__duration || DATA.duration || 8);
      window.__duration = DURATION;

      const W = 1280, H = 720;
      const canvas = document.getElementById('c');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(W, H);
      renderer.setClearColor(0x070912, 1);

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x070912, 0.028);
      const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);

      const accent = new THREE.Color(DATA.accent || '#e8590c');

      // 중앙 코어
      const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2.1, 1), new THREE.MeshBasicMaterial({ color: accent, wireframe: true }));
      scene.add(core);
      const coreGlow = new THREE.Mesh(new THREE.IcosahedronGeometry(1.9, 1), new THREE.MeshBasicMaterial({ color: accent, wireframe: true, transparent: true, opacity: 0.25 }));
      scene.add(coreGlow);

      // 노드(궤도) + 각 노드의 HTML 라벨
      const nodes = (DATA.nodes || []).slice(0, 6);
      const N = nodes.length || 1;
      const meshes = [];
      const labelEls = [];
      const labelsWrap = document.getElementById('labels');
      nodes.forEach((n, i) => {
        const col = new THREE.Color(n.color || '#4dabf7');
        const m = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.85, 0.85), new THREE.MeshBasicMaterial({ color: col, wireframe: true }));
        scene.add(m);
        meshes.push(m);
        const el = document.createElement('div');
        el.className = 'nodelabel';
        el.textContent = n.label || '';
        el.style.borderColor = '#' + col.getHexString();
        labelsWrap.appendChild(el);
        labelEls.push(el);
      });

      // 파티클
      const starGeo = new THREE.BufferGeometry();
      const SN = 700, pos = new Float32Array(SN * 3);
      for (let i = 0; i < SN * 3; i++) pos[i] = (Math.random() - 0.5) * 44;
      starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x8899bb, size: 0.055 }));
      scene.add(stars);

      const title = document.getElementById('title');
      const cap = document.getElementById('cap');
      document.getElementById('kicker').textContent = DATA.kicker || '';
      document.getElementById('h1').textContent = DATA.title || '';
      document.getElementById('capspan').textContent = DATA.caption || '';
      const easeOut = (t) => 1 - Math.pow(1 - t, 3);
      const clamp01 = (x) => Math.max(0, Math.min(1, x));

      const orbitR = 5.4;

      function seek(t) {
        t = clamp01(t);
        // 카메라: 살짝 돌리인 + 완만한 궤도 회전
        const camR = 13 - easeOut(clamp01(t * 1.3)) * 4.5;
        const ang = t * Math.PI * 0.85;
        camera.position.set(Math.sin(ang) * camR, 2.4 + Math.sin(t * 5) * 0.5, Math.cos(ang) * camR);
        camera.lookAt(0, 0, 0);
        camera.updateMatrixWorld();

        core.rotation.y = t * 5; core.rotation.x = t * 1.8;
        coreGlow.rotation.y = -t * 3.4;
        const pulse = 1 + Math.sin(t * 18) * 0.05;
        core.scale.setScalar(pulse); coreGlow.scale.setScalar(pulse * 1.15);

        meshes.forEach((m, i) => {
          const appear = easeOut(clamp01((t - 0.08 - i * (0.6 / N)) * 5));
          const a = t * Math.PI * 1.6 + (i / N) * Math.PI * 2;
          const rad = orbitR * appear;
          m.position.set(Math.cos(a) * rad, Math.sin(a * 1.2) * 1.1, Math.sin(a) * rad);
          m.scale.setScalar(appear * (1 + Math.sin(t * 16 + i) * 0.06));
          m.rotation.x = t * 4 + i; m.rotation.y = t * 4;
          // HTML 라벨을 3D 좌표에 투영
          const el = labelEls[i];
          if (appear < 0.02) { el.style.opacity = 0; return; }
          const v = m.position.clone().project(camera);
          const sx = (v.x * 0.5 + 0.5) * W;
          const sy = (-v.y * 0.5 + 0.5) * H;
          if (v.z > 1) { el.style.opacity = 0; return; }
          el.style.left = sx + 'px';
          el.style.top = (sy - 46) + 'px';
          el.style.opacity = appear;
        });

        stars.rotation.y = t * 0.25;

        const tin = easeOut(clamp01((t - 0.12) * 5));
        title.style.opacity = tin;
        title.style.transform = `translateY(${(1 - tin) * 18}px)`;
        cap.style.opacity = easeOut(clamp01((t - 0.5) * 5));

        renderer.render(scene, camera);
      }
      window.__seek = seek;

      let startTs = null;
      function loop(ts) {
        if (startTs === null) startTs = ts;
        const t = (ts - startTs) / 1000 / DURATION;
        seek(t);
        if (t < 1) requestAnimationFrame(loop);
        else window.__done = true;
      }
      window.__play = () => { startTs = null; window.__done = false; requestAnimationFrame(loop); };
      seek(0);
    </script>
  </body>
</html>
