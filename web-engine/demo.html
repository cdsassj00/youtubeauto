<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; height: 100%; background: #0a0c12; overflow: hidden; }
      #c { display: block; }
      .overlay {
        position: absolute; inset: 0; pointer-events: none;
        font-family: system-ui, Arial, sans-serif; color: #fff;
      }
      .title {
        position: absolute; left: 80px; top: 80px; opacity: 0;
        transform: translateY(20px); transition: none;
      }
      .kicker { font-size: 26px; color: #4dabf7; letter-spacing: 2px; }
      .h1 { font-size: 64px; font-weight: 800; margin-top: 8px; }
      .h1 .accent { color: #e8590c; }
      .caption {
        position: absolute; left: 80px; bottom: 70px; font-size: 30px;
        background: #000000aa; padding: 14px 26px; border-radius: 12px; opacity: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div class="overlay">
      <div class="title" id="title">
        <div class="kicker">AI CONCEPT · 3D</div>
        <div class="h1"><span class="accent">RAG</span> pipeline</div>
      </div>
      <div class="caption" id="cap">입력 → 검색 → 생성 → 답변</div>
    </div>

    <script src="./three.min.js"></script>
    <script>
      const W = 1280, H = 720;
      const canvas = document.getElementById('c');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(W, H);
      renderer.setClearColor(0x0a0c12, 1);

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x0a0c12, 0.03);
      const camera = new THREE.PerspectiveCamera(50, W / H, 0.1, 100);

      // 중앙 코어(LLM) — 발광 와이어 아이코사헤드론
      const core = new THREE.Mesh(
        new THREE.IcosahedronGeometry(2.2, 1),
        new THREE.MeshBasicMaterial({ color: 0xe8590c, wireframe: true }),
      );
      scene.add(core);
      const coreGlow = new THREE.Mesh(
        new THREE.IcosahedronGeometry(2.0, 1),
        new THREE.MeshBasicMaterial({ color: 0xffa94d, wireframe: true, transparent: true, opacity: 0.25 }),
      );
      scene.add(coreGlow);

      // 궤도 노드 4개 (입력/검색/생성/답변)
      const nodeColors = [0x4dabf7, 0x2f9e44, 0x9c36b5, 0xe64980];
      const nodes = [];
      for (let i = 0; i < 4; i++) {
        const m = new THREE.Mesh(
          new THREE.BoxGeometry(0.8, 0.8, 0.8),
          new THREE.MeshBasicMaterial({ color: nodeColors[i], wireframe: true }),
        );
        scene.add(m);
        nodes.push(m);
      }

      // 파티클 별
      const starGeo = new THREE.BufferGeometry();
      const N = 600, pos = new Float32Array(N * 3);
      for (let i = 0; i < N * 3; i++) pos[i] = (Math.random() - 0.5) * 40;
      starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x8899bb, size: 0.06 }));
      scene.add(stars);

      const DURATION = 6.0; // 초
      const title = document.getElementById('title');
      const cap = document.getElementById('cap');
      const easeOut = (t) => 1 - Math.pow(1 - t, 3);

      // 시점 t(0..1)에 맞춰 장면 상태를 결정 (결정적: 캡처 시 seek 가능)
      function seek(t) {
        t = Math.max(0, Math.min(1, t));
        // 카메라 돌리인 + 회전
        const camR = 12 - easeOut(Math.min(1, t * 1.4)) * 4;
        const ang = t * Math.PI * 0.9;
        camera.position.set(Math.sin(ang) * camR, 2.5 + Math.sin(t * 6) * 0.4, Math.cos(ang) * camR);
        camera.lookAt(0, 0, 0);

        core.rotation.y = t * 6; core.rotation.x = t * 2;
        coreGlow.rotation.y = -t * 4;
        const pulse = 1 + Math.sin(t * 20) * 0.05;
        core.scale.setScalar(pulse); coreGlow.scale.setScalar(pulse * 1.15);

        // 노드가 시간차로 궤도에 등장
        nodes.forEach((n, i) => {
          const appear = easeOut(Math.max(0, Math.min(1, (t - 0.1 - i * 0.12) * 4)));
          const a = t * Math.PI * 2 + (i / 4) * Math.PI * 2;
          const rad = 5.2 * appear;
          n.position.set(Math.cos(a) * rad, Math.sin(a * 1.3) * 1.2, Math.sin(a) * rad);
          n.scale.setScalar(appear);
          n.rotation.x = t * 5; n.rotation.y = t * 5;
        });

        stars.rotation.y = t * 0.3;

        // 오버레이 텍스트
        const tin = easeOut(Math.max(0, Math.min(1, (t - 0.15) * 5)));
        title.style.opacity = tin;
        title.style.transform = `translateY(${(1 - tin) * 20}px)`;
        cap.style.opacity = easeOut(Math.max(0, Math.min(1, (t - 0.55) * 5)));

        renderer.render(scene, camera);
      }
      window.__seek = seek;
      window.__duration = DURATION;

      // 실시간 자동 재생 (recordVideo 용). 캡처가 시작 신호를 준다.
      let startTs = null;
      function loop(ts) {
        if (startTs === null) startTs = ts;
        const t = (ts - startTs) / 1000 / DURATION;
        seek(t);
        if (t < 1) requestAnimationFrame(loop);
        else { window.__done = true; }
      }
      window.__play = () => { startTs = null; window.__done = false; requestAnimationFrame(loop); };
      seek(0); // 첫 프레임
    </script>
  </body>
</html>
