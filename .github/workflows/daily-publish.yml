name: 매일 AI 영상 자동 발행

on:
  schedule:
    # 매일 22:00 UTC = 다음날 07:00 KST 에 실행
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: '영상 주제 (비우면 모드에 따라 자동 선택)'
        required: false
        default: ''
      content_mode:
        description: '주제 모드 (auto | trend | basics)'
        required: false
        default: 'auto'
      do_upload:
        description: '유튜브 업로드 여부 (true | false)'
        required: false
        default: 'true'
  # 웹앱/외부에서 트리거 (client_payload 로 topic 전달)
  repository_dispatch:
    types: [publish-video]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # 파이프라인 단계별 스텝이 공유하는 환경변수 (웹앱 진행바가 스텝을 읽을 수 있도록 4단계로 분리)
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-opus-4-8' }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID }}
      ELEVENLABS_MODEL_ID: ${{ vars.ELEVENLABS_MODEL_ID || 'eleven_multilingual_v2' }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PRIVACY_STATUS: ${{ vars.YOUTUBE_PRIVACY_STATUS || 'private' }}
      YOUTUBE_CATEGORY_ID: ${{ vars.YOUTUBE_CATEGORY_ID || '27' }}
      TOPIC: ${{ github.event.inputs.topic || github.event.client_payload.topic || '' }}
      CONTENT_MODE: ${{ github.event.inputs.content_mode || github.event.client_payload.content_mode || vars.CONTENT_MODE || 'auto' }}
      TARGET_MINUTES: ${{ github.event.client_payload.target_minutes || vars.TARGET_MINUTES || '10' }}
      CONTENT_LANGUAGE: ${{ vars.CONTENT_LANGUAGE || 'ko' }}
      DO_UPLOAD: ${{ github.event.inputs.do_upload || github.event.client_payload.do_upload || 'true' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-1' }}
      PRESENTER_IMAGE_URL: ${{ secrets.PRESENTER_IMAGE_URL || vars.PRESENTER_IMAGE_URL || '' }}
      THUMBNAIL_TONE: ${{ vars.THUMBNAIL_TONE || 'dark' }}
      # 영상 엔진: illustrated(AI 흑백 일러스트) | web3d(3D 웹녹화) | remotion(손그림). 기본 illustrated.
      VIDEO_ENGINE: ${{ vars.VIDEO_ENGINE || 'illustrated' }}
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 한국어 폰트 & Chromium 의존성 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-nanum fonts-noto-cjk \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 libpango-1.0-0 libcairo2
          sudo fc-cache -f

      - name: 의존성 설치
        run: npm ci

      - name: Remotion 브라우저 준비
        run: npx remotion browser ensure

      - name: Playwright 브라우저 준비 (3D 웹녹화용)
        run: npx playwright install --with-deps chromium

      # ── 여기부터 4단계: 웹앱 진행바가 이 스텝 이름으로 진행도를 표시 ──
      - name: 대본 생성
        run: npm run generate:script

      - name: 나레이션 생성
        run: npm run generate:voice

      - name: 렌더링
        run: npm run render

      - name: 유튜브 업로드
        run: npm run upload

      - name: 산출물 업로드(디버그용 아티팩트)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output
          path: |
            out/video.mp4
            out/thumbnail.png
            out/script.json
            out/manifest.json
          if-no-files-found: ignore
          retention-days: 7
